name: Deploy Data Lake Terraform

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ==========================================
      # 1. DIAGNÓSTICO (Para ver tus carpetas reales)
      # ==========================================
      - name: Listar estructura del repositorio
        run: |
          echo "=== ¿Dónde está parado el servidor de GitHub? ==="
          pwd
          echo "=== Archivos y carpetas detectadas ==="
          ls -R
          echo "================================================"

      # ==========================================
      # 2. CONFIGURACIÓN DE CREDENCIALES
      # ==========================================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ==========================================
      # 3. ENTORNO PYTHON Y PRUEBAS UNITARIAS
      # ==========================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Buscamos e instalamos dependencias donde sea que esté el código
      - name: Install dependencies
        run: |
          pip install pytest pyspark
      
      # Buscamos dinámicamente la ruta de la carpeta archivos_para_bronze
      - name: Set PYTHONPATH & Run Tests
        run: |
          BRONZE_PATH=$(find . -type d -name "archivos_para_bronze" | head -n 1)
          echo "PYTHONPATH=$GITHUB_WORKSPACE/$BRONZE_PATH" >> $GITHUB_ENV
          pytest "$GITHUB_WORKSPACE/$BRONZE_PATH/tests/"

      # ==========================================
      # 4. DESPLIEGUE CON TERRAFORM
      # ==========================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # Buscamos dinámicamente la carpeta dev para ejecutar Terraform ahí dentro
      - name: Terraform Core Workflow
        run: |
          DEV_DIR=$(find . -type d -name "dev" | grep "terraform" | head -n 1)
          cd "$DEV_DIR"
          
          echo "=== Iniciando Terraform en: $DEV_DIR ==="
          terraform init
          terraform validate
          terraform plan -var-file="dev.tfvars"
          terraform apply -auto-approve -var-file="dev.tfvars"
          
          # Extraemos el output y lo guardamos globalmente
          echo "BRONZE_BUCKET=$(terraform output -raw bronze_bucket_name)" >> $GITHUB_ENV

      # ==========================================
      # 5. CARGA DE ARTEFACTOS A AMAZON S3
      # ==========================================
      - name: Upload Artifacts to S3
        run: |
          BRONZE_PATH=$(find . -type d -name "archivos_para_bronze" | head -n 1)
          
          echo "=== Subiendo Datos y Scripts a S3 ($BRONZE_BUCKET) ==="
          aws s3 cp "$BRONZE_PATH/sales_small.csv" "s3://$BRONZE_BUCKET/"
          aws s3 cp "$BRONZE_PATH/scripts/etl_sales.py" "s3://$BRONZE_BUCKET/scripts/etl_sales.py"